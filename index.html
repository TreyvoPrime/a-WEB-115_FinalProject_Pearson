<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> TeloType</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <h1 id="telotitle">TeloType</h1>

    <div id="top">

        <p id="typing_text">e</p>
    </div>
    <div id="main">
        <label for="typingBox"></label>

        <textarea id="typingBox" rows="8" spellcheck="false"></textarea>
        <p id="accuracy"></p>
        <br>
    </div>
    <div id="statistics">

    </div>
    <p id="wpm-display">Timer </p>
    <p id="wpm">your WPM will appear here once you complete the test</p>
    <p id="prev_wpm">Your previous score will appear here</p>
</body>
<script src="script.js" defer></script>

</html>
